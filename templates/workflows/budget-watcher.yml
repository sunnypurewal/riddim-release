# riddim-release template - copy to .github/workflows/budget-watcher.yml and adjust
#
# Polls user-account GitHub Actions billing usage and flips runner variables:
# - enforced profile: RUNNER_LABELS_MAC='["self-hosted","macOS"]', RUNNER_LABELS_LINUX='["self-hosted","macOS"]'
#
# Required repo secret: RUNNER_BUDGET_PAT
# Scopes: read:user, read:billing, repo
name: Runner Budget Watcher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  watch:
    name: Watch GitHub Actions budget
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_LINUX || '["self-hosted","macOS"]') }}
    steps:
      - name: Query billing
        id: billing
        env:
          GH_TOKEN: ${{ secrets.RUNNER_BUDGET_PAT }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          billing_json="$(gh api "/users/${OWNER}/settings/billing/actions")"

          total_minutes_used="$(
            jq -r '.total_minutes_used // 0' <<< "$billing_json"
          )"
          included_minutes="$(
            jq -r '.included_minutes // 0' <<< "$billing_json"
          )"

          pct="$(
            jq -rn \
              --argjson total "$total_minutes_used" \
              --argjson included "$included_minutes" \
              'if $included <= 0 then 100 else (($total / $included) * 100) end'
          )"

          {
            printf 'total_minutes_used=%s\n' "$total_minutes_used"
            printf 'included_minutes=%s\n' "$included_minutes"
            printf 'pct=%.2f\n' "$pct"
          } >> "$GITHUB_OUTPUT"

      - name: Flip to self-hosted if over 85%
        id: flip
        if: ${{ fromJSON(steps.billing.outputs.pct) >= 85 && vars.RUNNER_PROFILE != 'self-hosted' }}
        env:
          GH_TOKEN: ${{ secrets.RUNNER_BUDGET_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh variable set RUNNER_PROFILE \
            --repo "$REPO" \
            --body 'self-hosted'
          gh variable set RUNNER_LABELS_MAC \
            --repo "$REPO" \
            --body '["self-hosted","macOS"]'
          gh variable set RUNNER_LABELS_LINUX \
            --repo "$REPO" \
            --body '["self-hosted","macOS"]'

          {
            printf 'profile=%s\n' 'self-hosted'
            printf 'mac_labels=%s\n' '["self-hosted","macOS"]'
            printf 'linux_labels=%s\n' '["self-hosted","macOS"]'
          } >> "$GITHUB_OUTPUT"

      - name: Reset to hosted at start of new cycle (disabled while forcing self-hosted)
        id: reset
        if: ${{ false }}
        env:
          GH_TOKEN: ${{ secrets.RUNNER_BUDGET_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh variable set RUNNER_PROFILE \
            --repo "$REPO" \
            --body 'hosted'
          gh variable set RUNNER_LABELS_MAC \
            --repo "$REPO" \
            --body '["self-hosted","macOS"]'
          gh variable set RUNNER_LABELS_LINUX \
            --repo "$REPO" \
            --body '["self-hosted","macOS"]'

          {
            printf 'profile=%s\n' 'hosted'
            printf 'mac_labels=%s\n' '["self-hosted","macOS"]'
            printf 'linux_labels=%s\n' '["self-hosted","macOS"]'
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          CURRENT_PROFILE: ${{ vars.RUNNER_PROFILE || 'unset' }}
          CURRENT_MAC_LABELS: ${{ vars.RUNNER_LABELS_MAC || "[\"self-hosted\",\"macOS\"]" }}
          CURRENT_LINUX_LABELS: ${{ vars.RUNNER_LABELS_LINUX || "[\"self-hosted\",\"macOS\"]" }}
          FLIP_PROFILE: ${{ steps.flip.outputs.profile }}
          FLIP_MAC_LABELS: ${{ steps.flip.outputs.mac_labels }}
          FLIP_LINUX_LABELS: ${{ steps.flip.outputs.linux_labels }}
          RESET_PROFILE: ${{ steps.reset.outputs.profile }}
          RESET_MAC_LABELS: ${{ steps.reset.outputs.mac_labels }}
          RESET_LINUX_LABELS: ${{ steps.reset.outputs.linux_labels }}
        run: |
          set -euo pipefail

          final_profile="${FLIP_PROFILE:-${RESET_PROFILE:-$CURRENT_PROFILE}}"
          final_mac_labels="${FLIP_MAC_LABELS:-${RESET_MAC_LABELS:-$CURRENT_MAC_LABELS}}"
          final_linux_labels="${FLIP_LINUX_LABELS:-${RESET_LINUX_LABELS:-$CURRENT_LINUX_LABELS}}"

          {
            echo "## Runner budget watcher"
            echo ""
            echo "- Usage: ${{ steps.billing.outputs.total_minutes_used }} / ${{ steps.billing.outputs.included_minutes }} included minutes"
            echo "- Usage percent: ${{ steps.billing.outputs.pct }}%"
            echo "- Runner profile before watcher: $CURRENT_PROFILE"
            echo "- macOS labels before watcher: $CURRENT_MAC_LABELS"
            echo "- Linux labels before watcher: $CURRENT_LINUX_LABELS"
            echo "- Runner profile after watcher: $final_profile"
            echo "- macOS labels after watcher: $final_mac_labels"
            echo "- Linux labels after watcher: $final_linux_labels"
            echo ""
            echo "Thresholds: flip to self-hosted at >= 85%; reset step is disabled."
          } | tee -a "$GITHUB_STEP_SUMMARY"
