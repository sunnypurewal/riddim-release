# riddim-release template - copy to .github/workflows/collect-asc-analytics.yml and adjust
# Required config file: docs/analytics/report-catalog.json
# Required secrets for non-dry-runs: ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY
name: Collect App Store Connect Analytics

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Collection/backfill date (YYYY-MM-DD); blank uses today"
        required: false
        type: string
        default: ""
      families:
        description: "Comma-separated families"
        required: false
        type: string
        default: analytics,sales,finance
      dry_run:
        description: "Plan only; no ASC network writes/downloads"
        required: false
        type: boolean
        default: true
      create_requests:
        description: "Create missing Analytics Report requests with an Admin key"
        required: false
        type: boolean
        default: false
      evaluate_jira_key:
        description: "Optional Jira/campaign key to evaluate after normalization"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: read

jobs:
  call:
    uses: RiddimSoftware/riddim-release/.github/workflows/collect-asc-analytics.yml@v1
    with:
      config_path: docs/analytics/report-catalog.json
      report_date: ${{ inputs.report_date || '' }}
      families: ${{ inputs.families || 'analytics,sales,finance' }}
      dry_run: ${{ inputs.dry_run == true }}
      create_requests: ${{ inputs.create_requests == true }}
      normalize: true
      evaluate_jira_key: ${{ inputs.evaluate_jira_key || '' }}
      runner_labels_linux: ${{ vars.RUNNER_LABELS_LINUX || '["ubuntu-latest"]' }}
    secrets:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
