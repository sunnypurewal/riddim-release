# riddim-release template - copy to .github/workflows/website-promote.yml and adjust
# Requires repo variables: AMPLIFY_APP_ID, AWS_REGION, AWS_WEBSITE_PRODUCTION_ROLE_ARN
# Requires GitHub Environment: website-production with required reviewers.
name: Website Promote

on:
  pull_request:
    types: [closed]

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  promote:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository }}
    uses: RiddimSoftware/riddim-release/.github/workflows/website-promote.yml@v1
    with:
      amplify_app_id: ${{ vars.AMPLIFY_APP_ID }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      aws_role_arn: ${{ vars.AWS_WEBSITE_PRODUCTION_ROLE_ARN }}
      pr_number: ${{ github.event.pull_request.number }}
      source_sha: ${{ github.event.pull_request.head.sha }}
      production_branch: "main"
      production_url: "https://www.riddimsoftware.com/"
      preview_workflow_file: "website-preview.yml"
      runner_labels_linux: ${{ vars.RUNNER_LABELS_LINUX || '["ubuntu-latest"]' }}
    secrets: inherit
