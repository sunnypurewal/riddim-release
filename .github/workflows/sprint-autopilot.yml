name: Sprint autopilot

on:
  schedule:
    # GitHub Actions supports five-minute minimum cadence. Adjust this cron to
    # set "every X minutes" for the repository.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log the action without changing Jira"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

jobs:
  advance-sprint:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.SPRINT_AUTOPILOT_ENABLED == 'true' }}
    runs-on: ["self-hosted","macOS"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check sprint and PR state
        env:
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_BOARD_ID: ${{ vars.JIRA_BOARD_ID }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_SPRINT_DURATION_DAYS: ${{ vars.NEXT_SPRINT_DURATION_DAYS || '14' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || github.event_name != 'workflow_dispatch' && (vars.SPRINT_AUTOPILOT_DRY_RUN || 'false') }}
        run: python3 scripts/jira/sprint_autopilot.py
