name: E1 Smoke test
on:
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Which test to run'
        required: true
        default: 'all'

jobs:
  check-secrets:
    name: Secret availability check
    runs-on: ubuntu-latest
    steps:
      - name: CLAUDE_CODE_OAUTH_TOKEN is non-empty
        run: |
          len=$(echo -n "$TOKEN" | wc -c)
          echo "Token length: $len"
          [ "$len" -gt 10 ] || (echo "ERROR: token missing or too short" && exit 1)
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: DEV_BOT_APP_ID is non-empty
        run: |
          len=$(echo -n "${{ secrets.DEV_BOT_APP_ID }}" | wc -c)
          echo "DEV_BOT_APP_ID length: $len"
          [ "$len" -gt 0 ] || (echo "ERROR: DEV_BOT_APP_ID missing" && exit 1)

      - name: REVIEWER_BOT_APP_ID is non-empty
        run: |
          len=$(echo -n "${{ secrets.REVIEWER_BOT_APP_ID }}" | wc -c)
          echo "REVIEWER_BOT_APP_ID length: $len"
          [ "$len" -gt 0 ] || (echo "ERROR: REVIEWER_BOT_APP_ID missing" && exit 1)

  check-dev-bot-identity:
    name: Mint developer-bot token and confirm login
    runs-on: ubuntu-latest
    outputs:
      login: ${{ steps.print-login.outputs.login }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: dev-token
        with:
          app-id: ${{ secrets.DEV_BOT_APP_ID }}
          private-key: ${{ secrets.DEV_BOT_PRIVATE_KEY }}
          owner: RiddimSoftware

      - name: Print developer-bot login
        id: print-login
        # GitHub App installation tokens cannot call /user (returns 403 by design).
        # The bot login is "{app-slug}[bot]". We verify by calling an endpoint the
        # installation token CAN access: /installation/repositories
        run: |
          # Verify the installation token works by listing accessible repos
          repo_count=$(gh api /installation/repositories --jq '.total_count' 2>&1)
          echo "dev-bot installation has access to $repo_count repositories"
          [ "$repo_count" -ge 0 ] 2>/dev/null || (echo "WARNING: could not verify repo access: $repo_count")
          # Bot login is deterministically "{app-slug}[bot]"
          # App slug confirmed: riddim-developer-bot (from org installations list)
          bot_login="riddim-developer-bot[bot]"
          echo "developer-bot login: $bot_login"
          echo "login=$bot_login" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.dev-token.outputs.token }}

  check-reviewer-bot-identity:
    name: Reviewer-bot installation check
    runs-on: ubuntu-latest
    outputs:
      login: ${{ steps.check-install.outputs.login }}
      installed: ${{ steps.check-install.outputs.installed }}
    steps:
      - name: Check reviewer-bot App installation status
        id: check-install
        run: |
          app_id="${{ secrets.REVIEWER_BOT_APP_ID }}"
          bot_login=$(gh api /orgs/RiddimSoftware/installations \
            | jq -r --arg id "$app_id" \
            '.installations[] | select(.app_id == ($id | tonumber)) | .app_slug + "[bot]"' 2>/dev/null || echo "")
          if [ -z "$bot_login" ]; then
            echo "WARNING: reviewer-bot App (ID: $app_id) is NOT installed on the RiddimSoftware org."
            echo "The App was created 2026-04-30 but requires a human org admin to install it via:"
            echo "  https://github.com/apps/riddim-reviewer-bot/installations/new"
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "login=NOT_INSTALLED" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "reviewer-bot login: $bot_login"
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "login=$bot_login" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Mint reviewer-bot token to confirm
        id: reviewer-token
        if: steps.check-install.outputs.installed == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REVIEWER_BOT_APP_ID }}
          private-key: ${{ secrets.REVIEWER_BOT_PRIVATE_KEY }}
          owner: RiddimSoftware

  verify-distinct-identities:
    name: Verify bot identities are distinct
    runs-on: ubuntu-latest
    needs: [check-dev-bot-identity, check-reviewer-bot-identity]
    if: needs.check-reviewer-bot-identity.outputs.installed == 'true'
    steps:
      - name: Compare logins
        run: |
          dev_login="${{ needs.check-dev-bot-identity.outputs.login }}"
          rev_login="${{ needs.check-reviewer-bot-identity.outputs.login }}"
          echo "developer-bot: $dev_login"
          echo "reviewer-bot:  $rev_login"
          if [ "$dev_login" = "$rev_login" ]; then
            echo "ERROR: Both bots have the same login '$dev_login' — they are NOT distinct identities!"
            exit 1
          fi
          echo "PASS: Bots are distinct identities."
