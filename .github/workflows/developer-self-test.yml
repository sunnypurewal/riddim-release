# developer-self-test.yml
#
# Self-test for the reusable developer.yml workflow.
# Run this manually in riddim-release to validate changes to developer.yml
# before merging — especially important because all consumers run @main.
#
# Usage:
#   gh workflow run developer-self-test.yml \
#     --repo RiddimSoftware/riddim-release \
#     --field issue_number=1 \
#     --field dry_run=true

name: Developer Agent — Self Test

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Synthetic issue number to use in prompt (does not need to exist)"
        required: false
        default: "0"
        type: string
      dry_run:
        description: "If true, print the prompt but do not invoke the agent"
        required: false
        default: "true"
        type: boolean

jobs:
  self-test:
    name: Developer Self Test
    runs-on: ubuntu-latest
    steps:
      - name: Print test parameters
        run: |
          echo "issue_number: ${{ inputs.issue_number }}"
          echo "dry_run: ${{ inputs.dry_run }}"

      - name: Run developer workflow (synthetic issue)
        if: ${{ !inputs.dry_run }}
        uses: RiddimSoftware/riddim-release/.github/workflows/developer.yml@main
        secrets:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          dev_bot_pat: ${{ secrets.DEV_BOT_PAT }}
        with:
          trigger_type: issue_labeled
          issue_number: ${{ fromJSON(inputs.issue_number) }}
          issue_body: |
            ## Self-test issue

            This is a synthetic issue used to validate the developer-agent workflow.

            Add a file `smoke-test/developer-self-test.md` with the content:
            ```
            # Developer Agent Self Test
            This file was created by the developer-agent self-test workflow.
            Run: ${{ github.run_id }}
            ```

            Open a PR against main, title "chore: developer self-test run ${{ github.run_id }}".
            Close it after creation — this is only a smoke test.

      - name: Dry run — show prompt that would be sent
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN ==="
          echo "Would call developer.yml with:"
          echo "  trigger_type: issue_labeled"
          echo "  issue_number: ${{ inputs.issue_number }}"
          echo "  issue_body: <synthetic smoke test body>"
          echo ""
          echo "No agent was invoked. Set dry_run=false to run the full test."
