# developer-self-test.yml
#
# Self-test for the reusable developer.yml workflow.
# Run this manually in riddim-release to validate changes to developer.yml
# before merging -- especially important because all consumers run @main.
#
# Usage:
#   gh workflow run developer-self-test.yml \
#     --repo RiddimSoftware/riddim-release \
#     --field pr_number=1 \
#     --field dry_run=true

name: Developer Agent Self Test

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Synthetic PR number to use for the fix-up path"
        required: false
        default: "0"
        type: string
      dry_run:
        description: "If true, print the prompt but do not invoke the agent"
        required: false
        default: "true"
        type: boolean

jobs:
  dry-run:
    name: Developer Self Test Dry Run
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Print synthetic call parameters
        run: |
          echo "pr_number: ${{ inputs.pr_number }}"
          echo "dry_run: ${{ inputs.dry_run }}"
          echo ""
          echo "Would call developer.yml with:"
          echo "  trigger_type: changes_requested"
          echo "  pr_number: ${{ inputs.pr_number }}"
          echo "  review_comments: <synthetic review feedback>"
          echo ""
          echo "No agent was invoked. Set dry_run=false to run the full test."

  full-test:
    name: Developer Self Test Full Run
    if: ${{ !inputs.dry_run }}
    uses: ./.github/workflows/developer.yml
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      DEV_BOT_APP_ID: ${{ secrets.DEV_BOT_APP_ID }}
      DEV_BOT_PRIVATE_KEY: ${{ secrets.DEV_BOT_PRIVATE_KEY }}
    with:
      trigger_type: changes_requested
      pr_number: ${{ fromJSON(inputs.pr_number) }}
      review_comments: |
        Synthetic developer workflow self-test feedback.
        Add the deterministic fix-up artifact for run ${{ github.run_id }}.
      self_test_mode: true
      self_test_branch: selftest/${{ github.run_id }}
