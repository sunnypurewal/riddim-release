# developer-self-test.yml
#
# Lightweight self-test for the reusable developer.yml workflow (pr-fixup path).
# For the full self-test with cleanup, use _dev-self-test.yml.
#
# Usage:
#   gh workflow run developer-self-test.yml \
#     --repo RiddimSoftware/riddim-release \
#     --field dry_run=true

name: Developer Agent Self Test

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, print the call parameters but do not invoke the workflow"
        required: false
        default: "true"
        type: boolean

jobs:
  dry-run:
    name: Developer Self Test Dry Run
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Print synthetic call parameters
        run: |
          echo "dry_run: ${{ inputs.dry_run }}"
          echo ""
          echo "Would call developer.yml with:"
          echo "  trigger_type: changes_requested"
          echo "  pr_number: <synthetic run id>"
          echo "  self_test_mode: true"
          echo ""
          echo "No agent was invoked. Set dry_run=false to run the full test."

  full-test:
    name: Developer Self Test Full Run
    if: ${{ !inputs.dry_run }}
    uses: ./.github/workflows/developer.yml
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      dev_bot_app_id: ${{ secrets.DEV_BOT_APP_ID }}
      dev_bot_private_key: ${{ secrets.DEV_BOT_PRIVATE_KEY }}
    with:
      trigger_type: changes_requested
      pr_number: ${{ github.run_id }}
      review_comments: "Synthetic review comment for developer self-test run ${{ github.run_id }}."
      prompt_override: "Developer self-test. Do not invoke the agent."
      mock_labels: "none"
      self_test_mode: true
      self_test_branch: selftest/${{ github.run_id }}
