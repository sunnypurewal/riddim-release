name: Deliver App Store Metadata

# Reusable workflow — called by each consuming app via a shim.
# Pushes updated App Store listing metadata (description, keywords, subtitle,
# promotional text, release notes) to App Store Connect with no binary upload.
#
# The push.paths filter that gates this on metadata file changes lives in the
# consumer shim, not here — workflow_call does not accept paths: filters.

on:
  workflow_call:
    inputs:
      riddim_actions_app_client_id:
        required: true
        type: string
      ios_workdir:
        required: false
        type: string
        default: "ios"
      bundle_id:
        required: true
        type: string
      team_id:
        required: true
        type: string
      runner_labels_mac:
        required: true
        type: string
      runner_labels_linux:
        required: true
        type: string
    secrets:
      AWS_RELEASE_ROLE_ARN:
        required: true
      riddim_actions_app_private_key:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deliver-metadata
  cancel-in-progress: true

env:
  RIDDIM_RELEASE_REF: ${{ vars.RIDDIM_RELEASE_REF || 'v1' }}

jobs:
  deliver:
    name: Push metadata to App Store Connect
    runs-on: ${{ fromJSON(inputs.runner_labels_linux) }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v6

      - name: Mint riddim-release checkout token
        id: riddim-release-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.riddim_actions_app_client_id }}
          private-key: ${{ secrets.riddim_actions_app_private_key }}
          owner: RiddimSoftware
          repositories: riddim-release
          permission-contents: read

      - name: Checkout riddim-release
        uses: actions/checkout@v6
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ env.RIDDIM_RELEASE_REF }}
          token: ${{ steps.riddim-release-token.outputs.token }}
          path: .riddim-release

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch App Store Connect credentials
        run: bash .riddim-release/scripts/runner/fetch_asc_secret.sh

      - name: Set up Ruby and Fastlane
        if: ${{ !contains(fromJSON(inputs.runner_labels_linux), 'self-hosted') }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ${{ inputs.ios_workdir }}

      - name: Deliver metadata to App Store Connect
        working-directory: ${{ inputs.ios_workdir }}
        run: bundle exec fastlane deliver

      - name: Summary
        run: |
          {
            echo "## Metadata delivered to App Store Connect"
            echo ""
            echo "Updated fields: description, subtitle, keywords, promotional text, release notes, support/marketing/privacy URLs."
            echo ""
            echo "Screenshots and binary were not touched."
            echo "Changes are visible immediately in App Store Connect and go live to users on the next approved app version."
          } >> "$GITHUB_STEP_SUMMARY"
