# Self-test for .github/workflows/developer.yml.
#
# Run before merging changes to developer.yml or developer prompts:
#   gh workflow run _dev-self-test.yml \
#     --repo RiddimSoftware/riddim-release \
#     -f review_comments="Synthetic review comment"

name: Developer Workflow Self-Test

on:
  workflow_dispatch:
    inputs:
      review_comments:
        description: "Synthetic review comments for pr-fixup self-tests."
        required: false
        type: string
        default: "Address the deterministic developer self-test review comment."
      cleanup:
        description: "Delete throwaway selftest branches after assertions."
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: developer-self-test-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  exercise-developer-workflow:
    name: Exercise developer.yml
    uses: ./.github/workflows/developer.yml
    with:
      trigger_type: changes_requested
      pr_number: ${{ github.run_id }}
      review_comments: ${{ inputs.review_comments }}
      prompt_override: "RIDDIM-111 deterministic self-test. Do not invoke the agent."
      mock_labels: "none"
      self_test_mode: true
      self_test_branch: selftest/${{ github.run_id }}
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      dev_bot_app_id: ${{ secrets.DEV_BOT_APP_ID }}
      dev_bot_private_key: ${{ secrets.DEV_BOT_PRIVATE_KEY }}

  assert-and-cleanup:
    name: Assert artifacts and clean up
    needs: exercise-developer-workflow
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Download self-test artifact
        if: ${{ needs.exercise-developer-workflow.result == 'success' && env.ACT != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: developer-self-test-${{ github.run_id }}
          path: self-test-artifact

      - name: Checkout self-test branch
        if: ${{ needs.exercise-developer-workflow.result == 'success' && env.ACT != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: selftest/${{ github.run_id }}
          fetch-depth: 0
          token: ${{ secrets.DEV_BOT_PAT || github.token }}

      - name: Assert expected artifact exists
        if: ${{ needs.exercise-developer-workflow.result == 'success' && env.ACT != 'true' }}
        run: |
          set -euo pipefail
          test -s self-test-artifact/developer-self-test-fixup.md

      - name: Note local act assertion coverage
        if: ${{ needs.exercise-developer-workflow.result == 'success' && env.ACT == 'true' }}
        run: |
          echo "ACT=true; artifact assertion ran inside the reusable workflow job."

      - name: Delete self-test branch
        if: ${{ inputs.cleanup && needs.exercise-developer-workflow.result == 'success' && env.ACT != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.DEV_BOT_PAT || github.token }}
          BRANCH: selftest/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git push origin --delete "$BRANCH"

      - name: Fail if reusable workflow failed
        if: ${{ needs.exercise-developer-workflow.result != 'success' }}
        run: |
          echo "::error::developer.yml self-test workflow failed."
          exit 1
