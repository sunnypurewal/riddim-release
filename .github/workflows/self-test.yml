name: Self-test (internal smoke)

# Internal smoke test for build-deploy.yml. Requires repo secrets:
#   AWS_RELEASE_ROLE_ARN, KEYCHAIN_PASSWORD
# and repo variables:
#   RUNNER_LABELS_MAC (e.g. '["self-hosted","macOS"]'), RUNNER_LABELS_LINUX (e.g. '["self-hosted","macOS"]')
#   RIDDIM_RELEASE_REF (optional; use "main" before the v1 tag exists)
#
# Run with dry_run: true - the DAG executes version computation and reusable
# workflow wiring but skips signing, archive, TestFlight upload, dSYM upload,
# keychain setup, and draft release creation. No App Store side-effects occur.
# Not callable externally (no workflow_call trigger).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        type: choice
        default: patch
        options: [patch, minor, major]
      apple_app_id:
        description: 'App Store Connect App ID to use for version lookup'
        required: false
        type: string
        default: '1224459142'   # epac fixture — safe for version-compute smoke

permissions:
  contents: write
  id-token: write

jobs:
  smoke:
    uses: ./.github/workflows/build-deploy.yml
    with:
      apple_app_id:     ${{ inputs.apple_app_id }}
      bundle_id:        net.dinglebox.cabinetdoor
      team_id:          ZG82TFXU3C
      scheme:           epac
      xcodeproj_path:   ios/epac.xcodeproj
      ios_workdir:      ios
      bump:             ${{ inputs.bump }}
      dry_run:          true
      runner_labels_mac:   ${{ vars.RUNNER_LABELS_MAC || "[\"self-hosted\",\"macOS\"]" }}
      runner_labels_linux: ${{ vars.RUNNER_LABELS_LINUX || "[\"self-hosted\",\"macOS\"]" }}
    secrets: inherit
