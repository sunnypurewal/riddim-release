# Shared infrastructure - high blast radius.
#
# Reusable stale-PR / rebase workflow for RIDDIM-91 E8/E9/E10.
# Consumer repos call this from a base-branch push watcher or scheduled watcher
# after selecting an open PR labeled `autonomous`.
#
# Outcomes:
# - clean/behind: fast-forward rebase and push with --force-with-lease.
# - dirty: invoke conflict resolver, validate the edit surface, run consumer
#   verification, and push only on green.
# - guard blocked or verification failed: apply agent:needs-human and leave a
#   fixed-marker PR comment for human handoff.

name: Agent Rebase (reusable)

on:
  workflow_call:
    inputs:
      consumer_repo:
        description: "Owner/repo of the consuming repository (e.g. RiddimSoftware/epac)"
        required: false
        type: string
        default: ""
      pr_number:
        required: true
        type: number
      base_branch:
        required: false
        type: string
        default: main
      build_command:
        required: false
        type: string
        default: ""
      test_command:
        required: false
        type: string
        default: ""
      rebase_max_attempts:
        required: false
        type: number
        default: 3
      rebase_max_files:
        required: false
        type: number
        default: 8
      rebase_max_lines:
        required: false
        type: number
        default: 200
      self_test_mode:
        required: false
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      DEV_BOT_PAT:
        required: true
      REVIEWER_BOT_PAT:
        required: true

  workflow_dispatch:
    inputs:
      consumer_repo:
        description: "Owner/repo of the consuming repository (e.g. RiddimSoftware/epac)"
        required: true
        type: string
      pr_number:
        description: "PR number to rebase"
        required: true
        type: number
      base_branch:
        description: "Base branch"
        required: false
        type: string
        default: main
      self_test_mode:
        description: "Exercise guard wiring without pushing"
        required: false
        type: boolean
        default: true

concurrency:
  group: rebase-${{ inputs.consumer_repo || github.repository }}-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  CONSUMER_REPO: ${{ inputs.consumer_repo || github.repository }}
  NEEDS_HUMAN_LABEL: agent:needs-human
  CONFLICT_CONTEXT_DIR: .agent-rebase
  GUARD_COMMENT_MARKER: "<!-- riddim:agent-rebase:failure -->"

jobs:
  rebase:
    name: Rebase autonomous PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          path: riddim-release
          ref: main
          token: ${{ secrets.DEV_BOT_PAT || github.token }}
          fetch-depth: 0

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.DEV_BOT_PAT || github.token }}
          CONSUMER_REPO: ${{ inputs.consumer_repo || github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_json="$(gh pr view "$PR_NUMBER" --repo "$CONSUMER_REPO" --json headRefName,headRepositoryOwner,labels)"
          head_ref="$(jq -r .headRefName <<< "$pr_json")"
          head_owner="$(jq -r .headRepositoryOwner.login <<< "$pr_json")"
          labels="$(jq -r '.labels[].name' <<< "$pr_json")"

          if grep -Fxq "agent:pause" <<< "$labels" || grep -Fxq "$NEEDS_HUMAN_LABEL" <<< "$labels"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUMBER is paused or needs human review; skipping."
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "head_owner=$head_owner" >> "$GITHUB_OUTPUT"

      - name: Prepare PR branch
        if: ${{ steps.pr.outputs.skip != 'true' }}
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "developer-bot"
          git config user.email "developer-bot@users.noreply.github.com"
          git fetch origin "$BASE_BRANCH" "$HEAD_REF"
          git checkout "$HEAD_REF"

      - name: Try mechanical rebase
        if: ${{ steps.pr.outputs.skip != 'true' }}
        id: mechanical
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set +e
          git rebase "origin/${BASE_BRANCH}"
          status=$?
          set -e
          if [[ "$status" == "0" ]]; then
            echo "state=clean" >> "$GITHUB_OUTPUT"
          else
            echo "state=dirty" >> "$GITHUB_OUTPUT"
          fi

      - name: Run rebase guard
        if: ${{ steps.pr.outputs.skip != 'true' }}
        id: guard
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT || secrets.DEV_BOT_PAT || github.token }}
          REBASE_INCREMENT_ATTEMPT: "true"
          REBASE_MAX_ATTEMPTS: ${{ inputs.rebase_max_attempts || 3 }}
          REBASE_MAX_FILES: ${{ inputs.rebase_max_files || 8 }}
          REBASE_MAX_LINES: ${{ inputs.rebase_max_lines || 200 }}
        run: |
          set -euo pipefail
          output="$(bash riddim-release/.github/scripts/rebase-guard.sh "${{ inputs.pr_number }}" "${{ inputs.consumer_repo || github.repository }}")"
          decision="$(head -n 1 <<< "$output")"
          reason_json="$(tail -n 1 <<< "$output")"
          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          {
            echo "reason_json<<EOF"
            echo "$reason_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$output"

      - name: Stop when guard blocks
        if: ${{ steps.guard.outputs.decision != 'ok' }}
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT || secrets.DEV_BOT_PAT || github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          DECISION: ${{ steps.guard.outputs.decision }}
          REASON_JSON: ${{ steps.guard.outputs.reason_json }}
        run: |
          set -euo pipefail
          echo "Rebase guard decision: ${DECISION}"
          echo "${REASON_JSON}"

          # Apply agent:needs-human for all guard-block outcomes
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --add-label "agent:needs-human" >/dev/null 2>&1 || true

          # Post or update the fixed-marker status comment
          MARKER="<!-- riddim:watcher-status -->"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          REASON_TEXT="$(echo "${REASON_JSON}" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("reason",""))' 2>/dev/null || echo "${DECISION}")"
          BODY="${MARKER}
**Last watcher run:** ${TIMESTAMP}
**State:** guard-blocked
**Action:** agent:needs-human applied (${DECISION}: ${REASON_TEXT})"
          existing_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | tail -n 1 || true)"
          if [[ -n \"$existing_id\" ]]; then
            gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              --field "body=${BODY}" >/dev/null 2>&1 || true
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$BODY" >/dev/null 2>&1 || true
          fi

          git rebase --abort >/dev/null 2>&1 || true

      - name: Extract conflict context
        if: ${{ steps.guard.outputs.decision == 'ok' && steps.mechanical.outputs.state == 'dirty' && !inputs.self_test_mode }}
        id: conflict_context
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT }}
          CONSUMER_REPO: ${{ inputs.consumer_repo || github.repository }}
        run: |
          set -euo pipefail
          bash riddim-release/.github/scripts/extract-conflict-context.sh \
            "${{ inputs.pr_number }}" \
            "$CONSUMER_REPO" \
            "${{ inputs.base_branch }}" \
            "$CONFLICT_CONTEXT_DIR" | tee "$CONFLICT_CONTEXT_DIR/outputs.txt"
          cat "$CONFLICT_CONTEXT_DIR/outputs.txt" >> "$GITHUB_OUTPUT"

      - name: Load conflict resolver prompt
        if: ${{ steps.guard.outputs.decision == 'ok' && steps.mechanical.outputs.state == 'dirty' && !inputs.self_test_mode }}
        id: conflict_prompt
        run: |
          {
            echo "prompt<<EOF"
            cat riddim-release/.github/agent-prompts/conflict-resolver-v1.md
            echo
            cat "$CONFLICT_CONTEXT_DIR/conflict-context.md"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run conflict resolver
        if: ${{ steps.guard.outputs.decision == 'ok' && steps.mechanical.outputs.state == 'dirty' && !inputs.self_test_mode }}
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.REVIEWER_BOT_PAT }}
          prompt: ${{ steps.conflict_prompt.outputs.prompt }}

      - name: Validate and continue resolved rebase
        if: ${{ steps.guard.outputs.decision == 'ok' && steps.mechanical.outputs.state == 'dirty' && !inputs.self_test_mode }}
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT }}
          CONSUMER_REPO: ${{ inputs.consumer_repo || github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          if ! bash riddim-release/.github/scripts/validate-conflict-resolution.sh \
            "$CONFLICT_CONTEXT_DIR/conflicted-files.txt" \
            "$CONFLICT_CONTEXT_DIR/outside-snapshot.json"; then
            diagnostic="$(mktemp)"
            {
              echo "$GUARD_COMMENT_MARKER"
              echo "Conflict resolver validation failed for PR #${PR_NUMBER}."
              echo
              echo "The workflow aborted the rebase and did not push. A human must inspect the conflict resolution."
              echo
              echo "Conflicted files:"
              echo '```'
              cat "$CONFLICT_CONTEXT_DIR/conflicted-files.txt"
              echo '```'
            } > "$diagnostic"
            gh pr edit "$PR_NUMBER" --repo "$CONSUMER_REPO" --add-label "$NEEDS_HUMAN_LABEL"
            gh pr comment "$PR_NUMBER" --repo "$CONSUMER_REPO" --body-file "$diagnostic"
            git rebase --abort || true
            exit 1
          fi

          xargs git add < "$CONFLICT_CONTEXT_DIR/conflicted-files.txt"
          GIT_EDITOR=true git rebase --continue

      - name: Run consumer verification
        if: ${{ steps.guard.outputs.decision == 'ok' && !inputs.self_test_mode }}
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT }}
          CONSUMER_REPO: ${{ inputs.consumer_repo || github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          BUILD_COMMAND: ${{ inputs.build_command }}
          TEST_COMMAND: ${{ inputs.test_command }}
        run: |
          set -euo pipefail
          run_and_capture() {
            local label="$1"
            local command="$2"
            [[ -n "$command" ]] || return 0
            echo "Running ${label}: ${command}"
            bash -lc "$command"
          }

          if ! run_and_capture "consumer build" "$BUILD_COMMAND"; then
            reason="Consumer build command failed."
          elif ! run_and_capture "consumer tests" "$TEST_COMMAND"; then
            reason="Consumer test command failed."
          else
            reason=""
          fi

          if [[ -n "$reason" ]]; then
            diagnostic="$(mktemp)"
            {
              echo "$GUARD_COMMENT_MARKER"
              echo "Agent rebase verification failed for PR #${PR_NUMBER}."
              echo
              echo "Reason: ${reason}"
              echo
              echo "The workflow aborted the rebase and did not push. A human must inspect the PR."
            } > "$diagnostic"
            gh pr edit "$PR_NUMBER" --repo "$CONSUMER_REPO" --add-label "$NEEDS_HUMAN_LABEL"
            gh pr comment "$PR_NUMBER" --repo "$CONSUMER_REPO" --body-file "$diagnostic"
            git rebase --abort || true
            exit 1
          fi

      - name: Push rebased PR branch
        if: ${{ steps.guard.outputs.decision == 'ok' && !inputs.self_test_mode }}
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -euo pipefail
          git push --force-with-lease origin "HEAD:${HEAD_REF}"

      - name: Update watcher status after rebase
        if: ${{ steps.guard.outputs.decision == 'ok' && !inputs.self_test_mode }}
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_BOT_PAT || secrets.DEV_BOT_PAT || github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MECHANICAL_STATE: ${{ steps.mechanical.outputs.state }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          bash .github/scripts/update-watcher-status.sh \
            "$OWNER" "$REPO" "$PR_NUMBER" \
            "rebased-${MECHANICAL_STATE}" \
            "pushed rebase onto ${BASE_BRANCH} (${MECHANICAL_STATE})"

      - name: Self-test summary
        if: ${{ inputs.self_test_mode }}
        run: |
          echo "Self-test mode completed. Mechanical state: ${{ steps.mechanical.outputs.state }}; guard: ${{ steps.guard.outputs.decision }}."
