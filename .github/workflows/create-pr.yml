# create-pr.yml — Reusable workflow: open a PR as developer-bot for a branch
# that was implemented outside GitHub Actions (e.g. triggered from Jira).
#
# Called by consumer repos via repository_dispatch event type 'jira-ticket-ready'.
# The caller passes: jira_ticket, jira_summary, branch (optional — workflow
# searches by ticket key if omitted).
#
# SECRETS REQUIRED (org-level, selected-repo access):
#   DEV_BOT_APP_ID      — developer-bot GitHub App ID
#   DEV_BOT_PRIVATE_KEY — developer-bot GitHub App private key (PEM)

name: Create PR from Jira ticket (reusable)

on:
  workflow_call:
    inputs:
      jira_ticket:
        description: "Jira ticket key, e.g. EPAC-123"
        required: true
        type: string
      jira_summary:
        description: "Jira ticket summary (used as PR title suffix)"
        required: true
        type: string
      branch:
        description: "Branch to open PR for. If empty, first branch containing jira_ticket is used."
        required: false
        type: string
        default: ""
      base_branch:
        description: "Base branch for the PR"
        required: false
        type: string
        default: main
      jira_url:
        description: "Full URL to the Jira ticket (used in PR body)"
        required: false
        type: string
        default: ""
    secrets:
      dev_bot_app_id:
        required: true
      dev_bot_private_key:
        required: true

jobs:
  create-pr:
    name: Open PR as developer-bot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Generate developer-bot token
        id: dev-bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.dev_bot_app_id }}
          private-key: ${{ secrets.dev_bot_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Resolve branch name
        id: branch
        env:
          GH_TOKEN: ${{ steps.dev-bot-token.outputs.token }}
          JIRA_TICKET: ${{ inputs.jira_ticket }}
          BRANCH_INPUT: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          if [[ -n "$BRANCH_INPUT" ]]; then
            echo "branch=$BRANCH_INPUT" >> "$GITHUB_OUTPUT"
            echo "Resolved branch from input: $BRANCH_INPUT"
            exit 0
          fi

          # Search for a branch whose name contains the ticket key
          branch="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads" \
            --paginate \
            --jq ".[] | select(.ref | ascii_downcase | contains(\"$(echo "$JIRA_TICKET" | tr '[:upper:]' '[:lower:]')\")) | .ref | ltrimstr(\"refs/heads/\")" \
            | head -1)"

          if [[ -z "$branch" ]]; then
            echo "::error::No branch found containing '$JIRA_TICKET'. Push a branch with the ticket key in its name first."
            exit 1
          fi

          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Resolved branch by ticket key search: $branch"

      - name: Check branch is ahead of base
        env:
          GH_TOKEN: ${{ steps.dev-bot-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          BASE: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail
          comparison="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${BASE}...${BRANCH}" \
            --jq '{ahead: .ahead_by, behind: .behind_by}')"
          ahead="$(echo "$comparison" | jq -r '.ahead')"
          behind="$(echo "$comparison" | jq -r '.behind')"
          echo "Branch '$BRANCH' is $ahead commit(s) ahead, $behind commit(s) behind '$BASE'."
          if [[ "$ahead" -eq 0 ]]; then
            echo "::error::Branch '$BRANCH' has no commits ahead of '$BASE'. Nothing to PR."
            exit 1
          fi

      - name: Check PR does not already exist
        id: pr-check
        env:
          GH_TOKEN: ${{ steps.dev-bot-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          existing="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [[ -n "$existing" ]]; then
            echo "::notice::PR #$existing already exists for branch '$BRANCH'. Skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$existing" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR as developer-bot
        id: create-pr
        if: steps.pr-check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ steps.dev-bot-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          BASE: ${{ inputs.base_branch }}
          JIRA_TICKET: ${{ inputs.jira_ticket }}
          JIRA_SUMMARY: ${{ inputs.jira_summary }}
          JIRA_URL: ${{ inputs.jira_url }}
        run: |
          set -euo pipefail

          jira_ref=""
          if [[ -n "$JIRA_URL" ]]; then
            jira_ref="[$JIRA_TICKET]($JIRA_URL)"
          else
            jira_ref="$JIRA_TICKET"
          fi

          body="## Why

Implements ${jira_ref}: ${JIRA_SUMMARY}

## What changed

See commits on branch \`${BRANCH}\`.

## Test plan

- Review diff and confirm acceptance criteria from ${jira_ref} are met.

Resolves ${JIRA_TICKET}

Release-Note: Omitted pending review."

          pr_url="$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "${JIRA_TICKET}: ${JIRA_SUMMARY}" \
            --body "$body")"

          pr_number="$(echo "$pr_url" | grep -o '[0-9]*$')"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "Created PR: $pr_url"

      - name: Add autonomous label to enroll in review loop
        env:
          GH_TOKEN: ${{ steps.dev-bot-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pr_number || steps.pr-check.outputs.pr_number }}
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label "autonomous"
          echo "Added 'autonomous' label to PR #$PR_NUMBER."

      - name: Enable auto-merge
        if: steps.pr-check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ steps.dev-bot-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto --squash
          echo "Auto-merge enabled on PR #$PR_NUMBER."
