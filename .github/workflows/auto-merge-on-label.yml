name: Auto-merge on automate label

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    if: github.event.label.name == 'automate' || github.event.label.name == 'autonomous'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.DEV_BOT_PAT }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_REPO="${{ github.repository }}"

          if gh pr view "$PR_NUMBER" --repo "$PR_REPO" --json autoMergeRequest --jq '.autoMergeRequest != null' | grep -qx true; then
            echo "Auto-merge already enabled for PR #$PR_NUMBER"
            exit 0
          fi

          gh pr merge --auto --squash "$PR_NUMBER" --repo "$PR_REPO"
