name: Auto-merge on automate label

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    if: github.event.label.name == 'automate' || github.event.label.name == 'autonomous'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.DEV_BOT_PAT }}
        run: |
          # gh pr merge --auto exits 0 if auto-merge is already enabled
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" || true
