name: Build and Deploy (reusable)

# Reusable workflow: archive an iOS app, upload to TestFlight, and create
# a draft GitHub Release. Callers supply all app-specific params via inputs.
# Set dry_run: true to verify version computation and workflow wiring without
# signing, archiving, uploading to TestFlight, or creating a draft release.

on:
  workflow_call:
    inputs:
      apple_app_id:
        required: true
        type: string
      bundle_id:
        required: true
        type: string
      team_id:
        required: true
        type: string
      scheme:
        required: true
        type: string
      xcodeproj_path:
        required: true
        type: string
      ios_workdir:
        required: false
        type: string
        default: "ios"
      bump:
        required: false
        type: string
        default: "patch"
      primary_locale:
        required: false
        type: string
        default: "en-US"
      extra_bundle_ids:
        required: false
        type: string
        default: ""
      has_app_clip:
        required: false
        type: boolean
        default: false
      dry_run:
        required: false
        type: boolean
        default: false
      runner_labels_mac:
        required: true
        type: string   # JSON-encoded array, e.g. '["macos-15"]'
      runner_labels_linux:
        required: true
        type: string   # JSON-encoded array, e.g. '["ubuntu-latest"]'
    secrets:
      RIDDIM_ACTIONS_APP_PRIVATE_KEY:
        required: false
      AWS_RELEASE_ROLE_ARN:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      RIDDIM_RELEASE_TOKEN:
        required: false
      RUNNER_BUDGET_PAT:
        required: false
      SENTRY_DSN:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false
      SLACK_RELEASES_WEBHOOK:
        required: false
        description: >-
          Slack Incoming Webhook URL. When set, the workflow posts a "build
          ready for QA" message after the draft GitHub Release is created.
          When unset, the notification step logs a skip line and continues.

permissions:
  contents: write   # create draft GitHub Release
  id-token: write   # required for OIDC AWS authentication

concurrency:
  group: app-store-deploy
  cancel-in-progress: false   # never cancel a deploy mid-flight

env:
  RIDDIM_RELEASE_REF: ${{ vars.RIDDIM_RELEASE_REF || 'v1' }}   # pin callers to stable v1; override for pre-tag self-tests

jobs:
  # ─── Job 1: Determine the next version ─────────────────────────────────────
  compute-version:
    name: Compute next version
    runs-on: ${{ fromJSON(inputs.runner_labels_linux) }}
    outputs:
      next_version: ${{ steps.version.outputs.next_version }}
    steps:
      - name: Generate riddim-release token
        id: generate-token
        if: ${{ vars.RIDDIM_ACTIONS_APP_ID && secrets.RIDDIM_ACTIONS_APP_PRIVATE_KEY }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RIDDIM_ACTIONS_APP_ID }}
          private-key: ${{ secrets.RIDDIM_ACTIONS_APP_PRIVATE_KEY }}
          owner: RiddimSoftware
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Checkout riddim-release
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ env.RIDDIM_RELEASE_REF }}
          token: ${{ steps.generate-token.outputs.token || secrets.RIDDIM_RELEASE_TOKEN || secrets.RUNNER_BUDGET_PAT || github.token }}
          path: .riddim-release

      - name: Fetch ASC credentials
        run: bash .riddim-release/scripts/runner/fetch_asc_secret.sh

      - name: Install Python dependencies
        if: ${{ !contains(fromJSON(inputs.runner_labels_linux), 'self-hosted') }}
        run: pip3 install PyJWT requests cryptography --quiet

      - name: Compute next version
        id: version
        run: |
          python3 .riddim-release/scripts/release/compute_next_version.py \
            --app-id "${{ inputs.apple_app_id }}" \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key-path "$HOME/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8" \
            --bump "${{ inputs.bump }}" \
            --output-format github-output

  # ─── Job 2: Build and upload to TestFlight ──────────────────────────────────
  build-upload:
    name: Archive, sign, and upload to TestFlight
    runs-on: ${{ fromJSON(inputs.runner_labels_mac) }}
    needs: compute-version
    outputs:
      build_number: ${{ steps.build-number.outputs.build_number }}
    steps:
      - name: Generate riddim-release token
        id: generate-token
        if: ${{ vars.RIDDIM_ACTIONS_APP_ID && secrets.RIDDIM_ACTIONS_APP_PRIVATE_KEY }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RIDDIM_ACTIONS_APP_ID }}
          private-key: ${{ secrets.RIDDIM_ACTIONS_APP_PRIVATE_KEY }}
          owner: RiddimSoftware
      - uses: actions/checkout@v4

      - name: Checkout riddim-release
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ env.RIDDIM_RELEASE_REF }}
          token: ${{ steps.generate-token.outputs.token || secrets.RIDDIM_RELEASE_TOKEN || secrets.RUNNER_BUDGET_PAT || github.token }}
          path: .riddim-release

      - name: Select Xcode
        if: ${{ !inputs.dry_run && !contains(fromJSON(inputs.runner_labels_mac), 'self-hosted') }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Swift packages
        if: ${{ !inputs.dry_run }}
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles(format('{0}/**/*.resolved', inputs.ios_workdir)) }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Set up Ruby and Bundler
        if: ${{ !inputs.dry_run && !contains(fromJSON(inputs.runner_labels_mac), 'self-hosted') }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ${{ inputs.ios_workdir }}

      - name: Configure AWS credentials via OIDC
        if: ${{ !inputs.dry_run }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch ASC credentials
        if: ${{ !inputs.dry_run }}
        run: bash .riddim-release/scripts/runner/fetch_asc_secret.sh

      - name: Fetch distribution certificate
        if: ${{ !inputs.dry_run }}
        run: bash .riddim-release/scripts/runner/fetch_distribution_cert.sh

      - name: Create ephemeral keychain
        if: ${{ !inputs.dry_run }}
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash .riddim-release/scripts/runner/ephemeral_keychain.sh create

      - name: Dry-run build/upload summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run: computed version ${{ needs.compute-version.outputs.next_version }}."
          echo "Dry run: skipped signing, archive, TestFlight upload, dSYM upload, and keychain setup."

      - name: Build and upload to TestFlight
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ inputs.ios_workdir }}
        env:
          NEW_VERSION: ${{ needs.compute-version.outputs.next_version }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ steps.generate-token.outputs.token || secrets.RUNNER_BUDGET_PAT || secrets.RIDDIM_RELEASE_TOKEN || github.token }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/
        run: |
          bundle exec fastlane deploy \
            scheme:${{ inputs.scheme }} \
            bundle_id:${{ inputs.bundle_id }} \
            team_id:${{ inputs.team_id }} \
            xcodeproj:${{ inputs.xcodeproj_path }} \
            extra_bundle_ids:"${{ inputs.extra_bundle_ids }}"

      - name: Read build number
        id: build-number
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ inputs.ios_workdir }}
        run: |
          if [ ! -s build_number.txt ]; then
            echo "::error::build_number.txt was not written by the Fastlane deploy lane"
            exit 1
          fi
          echo "build_number=$(cat build_number.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload dSYMs to Sentry
        if: ${{ !inputs.dry_run }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN not set — skipping dSYM upload"
            exit 0
          fi
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload \
            --include-sources \
            ${{ inputs.ios_workdir }}/build/${{ inputs.scheme }}.xcarchive

      - name: Delete ephemeral keychain
        if: ${{ always() && !inputs.dry_run }}
        run: bash .riddim-release/scripts/runner/ephemeral_keychain.sh cleanup

  # ─── Job 3: Create draft GitHub Release ─────────────────────────────────────
  create-draft-release:
    name: Create draft GitHub Release
    runs-on: ${{ fromJSON(inputs.runner_labels_linux) }}
    needs: [compute-version, build-upload]
    if: ${{ !inputs.dry_run }}
    steps:
      - name: Generate riddim-release token
        id: generate-token
        if: ${{ vars.RIDDIM_ACTIONS_APP_ID && secrets.RIDDIM_ACTIONS_APP_PRIVATE_KEY }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RIDDIM_ACTIONS_APP_ID }}
          private-key: ${{ secrets.RIDDIM_ACTIONS_APP_PRIVATE_KEY }}
          owner: RiddimSoftware
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout riddim-release
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ env.RIDDIM_RELEASE_REF }}
          token: ${{ steps.generate-token.outputs.token || secrets.RIDDIM_RELEASE_TOKEN || secrets.RUNNER_BUDGET_PAT || github.token }}
          path: .riddim-release

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .riddim-release/scripts/release/generate_release_notes.py \
            --output /tmp/release_notes.txt

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.next_version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.txt \
            --draft \
            --target "${{ github.sha }}"

      # Slack-only notification — covers the operator-UX gap when a repo
      # cannot attach required reviewers to the app-store-release Environment
      # (e.g. private repo on Free plan). The webhook secret is optional; when
      # unset, this step logs a skip and continues.
      - name: Notify draft release ready for QA
        env:
          SLACK_RELEASES_WEBHOOK: ${{ secrets.SLACK_RELEASES_WEBHOOK }}
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_RELEASES_WEBHOOK:-}" ]]; then
            echo "SLACK_RELEASES_WEBHOOK not configured — skipping draft-release notification."
            exit 0
          fi
          VERSION="${{ needs.compute-version.outputs.next_version }}"
          BUILD_NUMBER="${{ needs.build-upload.outputs.build_number }}"
          REPO="${{ github.repository }}"
          APP_ID="${{ inputs.apple_app_id }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
          TF_URL="https://appstoreconnect.apple.com/apps/${APP_ID}/testflight/ios"
          text=$(printf ":package: *New build ready for QA* — \`%s\` v%s (build %s)\n\n• Draft Release: %s\n• TestFlight: %s\n\nClick *Publish* on the draft Release once QA passes — that fires release-app-store.yml and submits to App Store review." \
            "$REPO" "$VERSION" "$BUILD_NUMBER" "$RELEASE_URL" "$TF_URL")
          payload=$(jq -nc --arg text "$text" "{text: \$text}")
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "$payload" \
            "$SLACK_RELEASES_WEBHOOK" \
            -o /dev/null
          echo "Posted draft-release notification to Slack."
