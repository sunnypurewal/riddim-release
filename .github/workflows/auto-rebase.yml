# ============================================================================
# auto-rebase.yml — Mechanical fast-forward rebase for `behind` PRs
# RiddimSoftware/riddim-release
#
# SHARED INFRASTRUCTURE — HIGH BLAST RADIUS
# See docs/agent-loop/README.md and docs/agent-loop/failure-runbook.md.
#
# PURPOSE:
#   Rebases a PR branch onto the base branch when its mergeable_state is
#   `behind` (no conflicts, just out-of-date). Runs as developer-bot so the
#   resulting `synchronize` event triggers downstream workflows (the reviewer).
#
#   NEVER fall through to E9 (agent-conflict) on rebase failure. A `behind`
#   PR that produces conflicts during rebase means the watcher's classification
#   was wrong or main moved mid-fetch — surface it loudly so the bug can be
#   investigated.
#
# TRIGGERED BY:
#   rebase-watcher.yml via `gh workflow run auto-rebase.yml`
#   Also supports workflow_dispatch for manual recovery.
#
# SECRETS REQUIRED (org-level, selected-repo access):
#   DEV_BOT_PAT — developer-bot installation token or fine-grained PAT with
#                 `contents:write`, `pull_requests:write`.
# ============================================================================

name: Auto-Rebase (mechanical)

on:
  workflow_dispatch:
    inputs:
      consumer_repo:
        description: "Owner/repo of the consumer (e.g. RiddimSoftware/epac)"
        required: true
        type: string
      pr_number:
        description: "Pull request number to rebase"
        required: true
        type: number
      pr_head_sha:
        description: "Expected PR head SHA (used for --force-with-lease)"
        required: true
        type: string
      pr_branch:
        description: "PR head branch name"
        required: true
        type: string
      base_branch:
        description: "Target base branch (default: main)"
        required: false
        type: string
        default: main

  workflow_call:
    inputs:
      consumer_repo:
        required: true
        type: string
      pr_number:
        required: true
        type: number
      pr_head_sha:
        required: true
        type: string
      pr_branch:
        required: true
        type: string
      base_branch:
        required: false
        type: string
        default: main
    secrets:
      dev_bot_pat:
        required: true

# One rebase per PR at a time. If main advances mid-rebase, the new watcher
# run will cancel this job and start fresh on the updated base.
concurrency:
  group: auto-rebase-${{ inputs.consumer_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  rebase:
    name: Mechanical rebase PR #${{ inputs.pr_number }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check pause labels
        id: pause-check
        env:
          GH_TOKEN: ${{ secrets.dev_bot_pat || github.token }}
          CONSUMER_REPO: ${{ inputs.consumer_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          labels="$(gh pr view "$PR_NUMBER" --repo "$CONSUMER_REPO" --json labels --jq '.labels[].name' 2>/dev/null || true)"
          pause_label=""
          while IFS= read -r label; do
            case "$label" in
              agent:pause|agent:needs-human)
                pause_label="$label"
                break
                ;;
            esac
          done <<< "$labels"

          if [[ -n "$pause_label" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping auto-rebase for PR #${PR_NUMBER}: ${pause_label} present."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone consumer repo as developer-bot
        if: steps.pause-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.consumer_repo }}
          ref: ${{ inputs.pr_branch }}
          token: ${{ secrets.dev_bot_pat }}
          fetch-depth: 0

      - name: Configure git identity (developer-bot)
        if: steps.pause-check.outputs.skip != 'true'
        run: |
          git config user.name "developer-bot"
          git config user.email "developer-bot@users.noreply.github.com"

      - name: Fetch base branch
        if: steps.pause-check.outputs.skip != 'true'
        run: |
          git fetch origin "${{ inputs.base_branch }}"

      - name: Verify PR head SHA matches expected (anti-clobber)
        if: steps.pause-check.outputs.skip != 'true'
        id: sha-check
        env:
          EXPECTED_SHA: ${{ inputs.pr_head_sha }}
          PR_BRANCH: ${{ inputs.pr_branch }}
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse "origin/${PR_BRANCH}")"
          if [[ "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "::error::PR head SHA mismatch. Expected ${EXPECTED_SHA}, got ${actual_sha}."
            echo "  A human or another agent may have pushed to the PR branch since the watcher classified it."
            echo "  Aborting to avoid clobbering concurrent work."
            exit 1
          fi
          echo "SHA check passed: ${actual_sha}"

      - name: Rebase onto base branch
        if: steps.pause-check.outputs.skip != 'true'
        id: rebase
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail
          echo "Rebasing onto origin/${BASE_BRANCH}..."
          if ! git rebase "origin/${BASE_BRANCH}"; then
            git rebase --abort 2>/dev/null || true
            echo "rebase_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::Rebase produced conflicts. This should not happen for a 'behind' PR."
            echo "  This indicates a watcher classification bug or main moved mid-fetch."
            echo "  Do NOT fall through to agent-conflict (E9). Labelling for human review."
            exit 1
          fi
          echo "rebase_failed=false" >> "$GITHUB_OUTPUT"
          echo "Rebase succeeded."

      - name: Push rebased branch (force-with-lease)
        if: steps.pause-check.outputs.skip != 'true' && steps.rebase.outputs.rebase_failed != 'true'
        env:
          PR_BRANCH: ${{ inputs.pr_branch }}
          EXPECTED_HEAD: ${{ inputs.pr_head_sha }}
        run: |
          set -euo pipefail
          # Use explicit form --force-with-lease=<branch>:<expected-sha> to prevent
          # clobbering if a human pushed between our fetch and push.
          git push origin "${PR_BRANCH}" \
            "--force-with-lease=${PR_BRANCH}:${EXPECTED_HEAD}"
          echo "Pushed rebased branch ${PR_BRANCH}."

      - name: Handle rebase failure — label and comment
        if: failure() && steps.rebase.outputs.rebase_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.dev_bot_pat || github.token }}
          CONSUMER_REPO: ${{ inputs.consumer_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_BRANCH: ${{ inputs.pr_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --repo "$CONSUMER_REPO" --add-label "agent:rebase-failed" 2>/dev/null || true
          gh pr comment "$PR_NUMBER" --repo "$CONSUMER_REPO" --body "**Auto-Rebase failed** — unexpected merge conflicts on a \`behind\`-state PR.

This should not happen. It likely means:
- The watcher classified the PR as \`behind\` but main moved before \`git rebase\` ran, OR
- The PR's base branch was updated non-linearly.

**Do not re-trigger the mechanical rebase.** This PR needs human review to understand the conflict.

Diagnostics:
- PR branch: \`${PR_BRANCH}\`
- Base branch: \`${BASE_BRANCH}\`
- Watcher run: ${RUN_URL}

To recover:
1. Remove the \`agent:rebase-failed\` label once you've investigated.
2. Manually resolve conflicts and push, or close + refile with a clean branch.

cc @SunnyPurewal" 2>/dev/null || true

      - name: Handle force-with-lease rejection
        if: failure() && steps.rebase.outputs.rebase_failed != 'true' && steps.pause-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.dev_bot_pat || github.token }}
          CONSUMER_REPO: ${{ inputs.consumer_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_BRANCH: ${{ inputs.pr_branch }}
          EXPECTED_HEAD: ${{ inputs.pr_head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --repo "$CONSUMER_REPO" --body "**Auto-Rebase skipped** — PR head changed since the watcher classified it.

A concurrent push (human or another agent run) pushed to \`${PR_BRANCH}\` after the watcher snapshot was taken. The rebase was aborted to avoid overwriting that work.

The next watcher run (triggered by the concurrent push or the 15-minute cron) will re-classify and retry if still needed.

Diagnostics:
- Expected head: \`${EXPECTED_HEAD}\`
- Watcher run: ${RUN_URL}" 2>/dev/null || true

      - name: Log completion
        if: steps.pause-check.outputs.skip != 'true' && steps.rebase.outputs.rebase_failed != 'true'
        env:
          CONSUMER_REPO: ${{ inputs.consumer_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_BRANCH: ${{ inputs.pr_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          echo "Auto-rebase complete."
          echo "  PR: ${CONSUMER_REPO}#${PR_NUMBER}"
          echo "  Branch: ${PR_BRANCH} rebased onto origin/${BASE_BRANCH}"
          echo "  A pull_request[synchronize] event will trigger the reviewer workflow downstream."
