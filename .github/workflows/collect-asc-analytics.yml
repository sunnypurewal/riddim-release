name: Collect App Store Connect Analytics

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: docs/analytics/report-catalog.json
      report_date:
        required: false
        type: string
        default: ""
      families:
        required: false
        type: string
        default: analytics,sales,finance
      dry_run:
        required: false
        type: boolean
        default: true
      create_requests:
        required: false
        type: boolean
        default: false
      normalize:
        required: false
        type: boolean
        default: true
      evaluate_jira_key:
        required: false
        type: string
        default: ""
      goal_path:
        required: false
        type: string
        default: ""
      runner_labels_linux:
        required: false
        type: string
        default: '["self-hosted","macOS"]'
      python_version:
        required: false
        type: string
        default: "3.12"
      force_self_hosted:
        required: false
        type: boolean
        default: true
    secrets:
      RIDDIM_RELEASE_TOKEN:
        required: false
      RUNNER_BUDGET_PAT:
        required: false
      ASC_KEY_ID:
        required: false
      ASC_ISSUER_ID:
        required: false
      ASC_PRIVATE_KEY:
        required: false

permissions:
  contents: read

concurrency:
  group: collect-asc-analytics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    name: Collect ASC analytics artifact
    runs-on: ${{ fromJSON(inputs.force_self_hosted && '["self-hosted","macOS"]' || inputs.runner_labels_linux) }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout riddim-release
        uses: actions/checkout@v4
        with:
          repository: RiddimSoftware/riddim-release
          ref: ${{ vars.RIDDIM_RELEASE_REF || 'v1' }}
          token: ${{ secrets.RIDDIM_RELEASE_TOKEN || secrets.RUNNER_BUDGET_PAT || github.token }}
          path: .riddim-release

      - name: Set up Python
        if: ${{ !inputs.force_self_hosted && !contains(fromJSON(inputs.runner_labels_linux), 'self-hosted') }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python dependencies
        if: ${{ !inputs.force_self_hosted && !contains(fromJSON(inputs.runner_labels_linux), 'self-hosted') }}
        run: python3 -m pip install --upgrade pip -r .riddim-release/scripts/release/requirements.txt

      - name: Prepare ASC private key
        if: ${{ !inputs.dry_run }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$ASC_PRIVATE_KEY" ]; then
            echo "ASC_PRIVATE_KEY secret is required for non-dry-run collection." >&2
            exit 1
          fi
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "ASC_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Collect reports
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          args=(--config "${{ inputs.config_path }}" --families "${{ inputs.families }}")
          if [ -n "${{ inputs.report_date }}" ]; then
            args+=(--report-date "${{ inputs.report_date }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "${{ inputs.create_requests }}" = "true" ]; then
            args+=(--create-requests)
          fi
          python3 .riddim-release/scripts/analytics/collect_asc_analytics.py "${args[@]}"

      - name: Resolve artifact root
        id: artifact-root
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          report_date="${{ inputs.report_date }}"
          if [ -z "$report_date" ]; then
            report_date="$(date -u +%F)"
          fi
          root="$(python3 -c 'import json,re,sys; from pathlib import Path; config=json.load(open(sys.argv[1])); app=config.get("app", {}); slug=app.get("app_slug") or app.get("slug") or app.get("bundle_id") or app.get("app_id") or "app"; slug=re.sub(r"[^a-zA-Z0-9._-]+", "-", slug.strip()).strip("-").lower() or "app"; base=Path(config.get("output", {}).get("root") or config.get("output_dir", "docs/analytics/app-store-connect")); base=base if base.name == slug else base / slug; print(base / f"{sys.argv[2]}_{sys.argv[2]}")' "${{ inputs.config_path }}" "$report_date")"
          echo "root=$root" >> "$GITHUB_OUTPUT"

      - name: Normalize reports
        if: ${{ !inputs.dry_run && inputs.normalize }}
        run: python3 .riddim-release/scripts/analytics/normalize_reports.py --artifact-root "${{ steps.artifact-root.outputs.root }}"

      - name: Evaluate benchmark
        if: ${{ !inputs.dry_run && inputs.evaluate_jira_key != '' }}
        run: |
          set -euo pipefail
          args=(--artifact-root "${{ steps.artifact-root.outputs.root }}" --jira-key "${{ inputs.evaluate_jira_key }}")
          if [ -n "${{ inputs.goal_path }}" ]; then
            args+=(--goal "${{ inputs.goal_path }}")
          fi
          python3 .riddim-release/scripts/analytics/evaluate_benchmark.py "${args[@]}"

      - name: Upload analytics artifact
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: asc-analytics-${{ github.run_id }}
          path: ${{ steps.artifact-root.outputs.root }}
          if-no-files-found: error

      - name: Summary
        run: |
          {
            echo "## ASC analytics"
            echo ""
            echo "- Dry run: ${{ inputs.dry_run }}"
            echo "- Families: ${{ inputs.families }}"
            echo "- Config: ${{ inputs.config_path }}"
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              echo "- Artifact root: ${{ steps.artifact-root.outputs.root }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
